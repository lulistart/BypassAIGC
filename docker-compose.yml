services:
  bypass-aigc:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9800:9800"
    environment:
      PORT: 9800
      DATABASE_URL: sqlite:////data/ai_polish.db
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
      USE_STREAMING: ${USE_STREAMING:-false}
      POLISH_MODEL: ${POLISH_MODEL:-gpt-5}
      POLISH_API_KEY: ${POLISH_API_KEY:-}
      POLISH_BASE_URL: ${POLISH_BASE_URL:-}
      ENHANCE_MODEL: ${ENHANCE_MODEL:-gpt-5}
      ENHANCE_API_KEY: ${ENHANCE_API_KEY:-}
      ENHANCE_BASE_URL: ${ENHANCE_BASE_URL:-}
      COMPRESSION_MODEL: ${COMPRESSION_MODEL:-gpt-5}
      COMPRESSION_API_KEY: ${COMPRESSION_API_KEY:-}
      COMPRESSION_BASE_URL: ${COMPRESSION_BASE_URL:-}
    volumes:
      - bypass_aigc_data:/data

volumes:
  bypass_aigc_data:
